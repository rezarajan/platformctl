name: CI

on:
  push:
    branches: [main]
  pull_request:
  # docs/planning/08 §7 E8: weekly full-matrix soak. No job below needs an
  # `if: github.event_name == 'schedule'` guard to get this — the
  # `integration-plan` job's G7 branch already falls through to
  # `scripts/test-impact.sh --list --full` for any event that isn't
  # `pull_request` (schedule included), and `integration-k8s` has no event
  # gating at all, so adding this trigger alone reproduces "full-matrix
  # (test-impact --full + the Kubernetes job) once a week" with zero
  # changes to either job's own logic. Offset by an hour from
  # refresh-digests.yml's `0 6 * * 1` so the two scheduled workflows don't
  # contend for the same runner-pool minute.
  schedule:
    - cron: "0 7 * * 1" # Monday 07:00 UTC

permissions:
  contents: read

jobs:
  unit:
    name: Build, vet & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "files need gofmt:" && echo "$out" && exit 1
          fi

      # docs/planning/11 follow-up: .golangci.yml (v2 config, repo root) is
      # tuned to this repo's real conventions (see the config's own
      # comments and .claude/rules/go-style.md) — pin the action's version
      # in lockstep with any local `go run .../golangci-lint@<version>`
      # invocation so CI and a developer's machine agree on findings.
      - name: golangci-lint
        # action v7+ is required for golangci-lint v2.x configs — v6 only
        # accepts v1 version strings (found live: CI failed at prepare with
        # "golangci-lint v2 is not supported by golangci-lint-action v6").
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Build
        run: CGO_ENABLED=0 go build -trimpath -buildvcs=false ./cmd/platformctl

      - name: Vet
        run: |
          go vet ./...
          go vet -tags integration ./...

      - name: Unit & contract tests
        run: go test ./...

      # docs/planning/08 §7 E8: "unit+race" leg. Scoped to the same set as
      # "Unit & contract tests" above (no `-tags integration`, so it never
      # touches adapters needing Docker/K8s) — measured locally at ~41s
      # wall vs ~5.5s plain, cheap enough to run on every push/PR rather
      # than only on the weekly soak.
      - name: Race detector
        run: go test -race ./...

      - name: Validate examples
        run: |
          go run ./cmd/platformctl validate examples/cdc-attendance/
          go run ./cmd/platformctl validate examples/lakehouse/

      # docs/planning/08 §7.7 H4: the shipped zero-trust policy pack
      # (`platformctl policy init zero-trust`), evaluated via `platformctl
      # policy test` against every shipped example and blueprint with the
      # PolicyEngine gate enabled for this invocation only (it stays
      # Alpha/disabled everywhere else). Pure manifest evaluation — no
      # Docker, no state, trivial runtime cost (already included in "Unit
      # & contract tests" above; broken out as its own step for CI
      # visibility into posture regressions specifically). Dev-flavored
      # denies (plaintext connections, env-backend secrets, unpinned/
      # non-corp-registry images) carry recorded
      # policy.datascape.io/exempt waivers in the example/blueprint
      # manifests themselves; the one non-exemptible rule (protect-data —
      # its twin was removed by the owner's one-rule-per-fact decision,
      # docs/adr/021 addendum) fires on every shipped example/blueprint by
      # design and is pinned as a known, recorded finding in
      # cmd/platformctl/policy_pack_examples_test.go rather than routed
      # around — a *new* unexempted deny fails this step.
      - name: Policy pack against examples and blueprints
        run: go test ./cmd/platformctl/... -run TestZeroTrustPackAgainstExamplesAndBlueprints -v

  # Suite selection runs once; every selected suite then runs as its own
  # matrix job on its own runner (own Docker daemon — no shared-daemon
  # flock contention, which only exists for LOCAL shared daemons, doc 06
  # §10 rule 4). Wall-clock drops from the serial sum (~20 min) to the
  # slowest single suite plus setup, and a failure is isolated in its own
  # job log (owner request, doc 11 2026-07-22).
  integration-plan:
    name: Select integration suites
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 10
    outputs:
      suites: ${{ steps.plan.outputs.suites }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: plan
        name: Compute affected suites
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SUITES=$(scripts/test-impact.sh --list --base origin/main | tail -1)
          else
            SUITES=$(scripts/test-impact.sh --list --full | tail -1)
          fi
          echo "suites=$SUITES" >> "$GITHUB_OUTPUT"
          echo "selected: $SUITES"

  integration:
    name: "suite: ${{ matrix.suite }}"
    runs-on: ubuntu-latest
    needs: integration-plan
    if: needs.integration-plan.outputs.suites != '[]'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJSON(needs.integration-plan.outputs.suites) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Each runner has its own daemon; pre-pulling keeps per-test
      # timeouts honest (images pull in parallel on GH's network).
      - name: Pre-pull container images
        run: |
          docker pull docker.redpanda.com/redpandadata/redpanda:v24.2.1 &
          docker pull postgres:16 &
          docker pull quay.io/debezium/connect:2.7 &
          docker pull minio/minio:latest &
          docker pull mysql:8.4 &
          docker pull ghcr.io/projectnessie/nessie:latest &
          docker pull marquezproject/marquez:latest &
          docker pull alpine/socat:latest &
          docker pull hashicorp/vault:latest &
          wait

      # K8s-legged tests inside these suites skip themselves when no
      # cluster is reachable — the dedicated integration-k8s job provides
      # the cluster coverage (unchanged).
      - name: Run suite
        run: scripts/test-impact.sh --only "${{ matrix.suite }}"

  integration-k8s:
    # Sharded (owner request, doc 11 2026-07-22): each shard gets its own
    # kind cluster + minted minimal-RBAC kubeconfig and runs half the K8s
    # surface in parallel — adapter conformance vs cmd-level scenarios.
    name: "k8s ${{ matrix.shard }} (minimal RBAC)"
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [adapter, scenarios]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Create kind cluster
        uses: helm/kind-action@v1

      # docs/planning/08 B5: exercise the K8s runtime under exactly the
      # ServiceAccount/ClusterRole deploy/kubernetes/rbac ships as the
      # minimal production posture — not the kind-admin kubeconfig
      # kind-action leaves active — to prove that role is actually
      # sufficient, not merely documented as such.
      - name: Apply minimal RBAC and mint a scoped kubeconfig
        run: |
          kubectl apply -f deploy/kubernetes/rbac/serviceaccount.yaml \
                        -f deploy/kubernetes/rbac/role.yaml \
                        -f deploy/kubernetes/rbac/binding.yaml

          TOKEN=$(kubectl create token platformctl -n platformctl-system --duration=25m)
          SERVER=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')
          CAPATH=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.certificate-authority}')
          if [ -n "$CAPATH" ]; then
            CERT_ARG="--certificate-authority=$CAPATH"
          else
            kubectl config view --minify --raw -o jsonpath='{.clusters[0].cluster.certificate-authority-data}' \
              | base64 -d > "$RUNNER_TEMP/platformctl-ca.pem"
            CERT_ARG="--certificate-authority=$RUNNER_TEMP/platformctl-ca.pem"
          fi

          kubectl config set-cluster platformctl-cluster --server="$SERVER" $CERT_ARG --embed-certs=true \
            --kubeconfig="$RUNNER_TEMP/platformctl.kubeconfig"
          kubectl config set-credentials platformctl --token="$TOKEN" \
            --kubeconfig="$RUNNER_TEMP/platformctl.kubeconfig"
          kubectl config set-context platformctl --cluster=platformctl-cluster --user=platformctl \
            --kubeconfig="$RUNNER_TEMP/platformctl.kubeconfig"
          kubectl config use-context platformctl --kubeconfig="$RUNNER_TEMP/platformctl.kubeconfig"

          echo "PLATFORMCTL_KUBECONFIG=$RUNNER_TEMP/platformctl.kubeconfig" >> "$GITHUB_ENV"

      - name: Kubernetes runtime integration tests
        env:
          KUBECONFIG: ${{ env.PLATFORMCTL_KUBECONFIG }}
          PLATFORMCTL_REQUIRE_K8S: "1"
        run: |
          if [ "${{ matrix.shard }}" = "adapter" ]; then
            go test -tags integration -timeout 1200s \
              ./internal/adapters/runtime/kubernetes/... \
              ./internal/adapters/secrets/kubernetes/...
          else
            go test -tags integration -timeout 1200s -run Kubernetes ./cmd/platformctl/...
          fi
