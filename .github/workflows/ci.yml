name: CI

on:
  push:
    branches: [main]
  pull_request:
  # docs/planning/08 §7 E8: weekly full-matrix soak. No job below needs an
  # `if: github.event_name == 'schedule'` guard to get this — the
  # `integration` job's existing G7 branch already falls through to
  # `scripts/test-impact.sh --full` for any event that isn't
  # `pull_request` (schedule included), and `integration-k8s` has no event
  # gating at all, so adding this trigger alone reproduces "full-matrix
  # (test-impact --full + the Kubernetes job) once a week" with zero
  # changes to either job's own logic. Offset by an hour from
  # refresh-digests.yml's `0 6 * * 1` so the two scheduled workflows don't
  # contend for the same runner-pool minute.
  schedule:
    - cron: "0 7 * * 1" # Monday 07:00 UTC

permissions:
  contents: read

jobs:
  unit:
    name: Build, vet & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "files need gofmt:" && echo "$out" && exit 1
          fi

      - name: Build
        run: CGO_ENABLED=0 go build -trimpath -buildvcs=false ./cmd/platformctl

      - name: Vet
        run: |
          go vet ./...
          go vet -tags integration ./...

      - name: Unit & contract tests
        run: go test ./...

      # docs/planning/08 §7 E8: "unit+race" leg. Scoped to the same set as
      # "Unit & contract tests" above (no `-tags integration`, so it never
      # touches adapters needing Docker/K8s) — measured locally at ~41s
      # wall vs ~5.5s plain, cheap enough to run on every push/PR rather
      # than only on the weekly soak.
      - name: Race detector
        run: go test -race ./...

      - name: Validate examples
        run: |
          go run ./cmd/platformctl validate examples/cdc-attendance/
          go run ./cmd/platformctl validate examples/lakehouse/

  integration:
    name: Integration tests (Docker)
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
        with:
          # test-impact.sh diffs against origin/main on pull_request builds
          # (docs/planning/08 G7); that ref must be resolvable locally, which
          # the default shallow single-branch checkout doesn't give us.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # The suite stands up real Redpanda, Postgres, Debezium, and MinIO
      # containers and builds the sink Connect image (Debezium + Aiven S3
      # sink plugin) itself. Pre-pulling keeps per-test timeouts honest.
      - name: Pre-pull container images
        run: |
          docker pull docker.redpanda.com/redpandadata/redpanda:v24.2.1 &
          docker pull postgres:16 &
          docker pull quay.io/debezium/connect:2.7 &
          docker pull minio/minio:latest &
          docker pull mysql:8.4 &
          docker pull ghcr.io/projectnessie/nessie:latest &
          docker pull marquezproject/marquez:latest &
          docker pull alpine/socat:latest &
          docker pull hashicorp/vault:latest &
          wait

      # Includes the chaos-monkey suite (cmd/platformctl/chaos_integration_test.go):
      # out-of-band container kills/stops must be observed by `drift`, healed
      # by `apply`, survive a SIGKILL mid-apply, and `destroy` must converge
      # against already-dead infrastructure.
      #
      # docs/planning/08 G7: pull requests run only the suites the diff
      # affects (scripts/test-impact.sh --base origin/main); pushes to main
      # (and any future scheduled/nightly job — none exists yet) run the
      # full sweep via --full, so main always has complete integration
      # coverage regardless of what any one PR touched.
      - name: Integration & chaos tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            scripts/test-impact.sh --base origin/main
          else
            scripts/test-impact.sh --full
          fi

  integration-k8s:
    name: Integration tests (Kubernetes, minimal RBAC role)
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Create kind cluster
        uses: helm/kind-action@v1

      # docs/planning/08 B5: exercise the K8s runtime under exactly the
      # ServiceAccount/ClusterRole deploy/kubernetes/rbac ships as the
      # minimal production posture — not the kind-admin kubeconfig
      # kind-action leaves active — to prove that role is actually
      # sufficient, not merely documented as such.
      - name: Apply minimal RBAC and mint a scoped kubeconfig
        run: |
          kubectl apply -f deploy/kubernetes/rbac/serviceaccount.yaml \
                        -f deploy/kubernetes/rbac/role.yaml \
                        -f deploy/kubernetes/rbac/binding.yaml

          TOKEN=$(kubectl create token platformctl -n platformctl-system --duration=25m)
          SERVER=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')
          CAPATH=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.certificate-authority}')
          if [ -n "$CAPATH" ]; then
            CERT_ARG="--certificate-authority=$CAPATH"
          else
            kubectl config view --minify --raw -o jsonpath='{.clusters[0].cluster.certificate-authority-data}' \
              | base64 -d > "$RUNNER_TEMP/platformctl-ca.pem"
            CERT_ARG="--certificate-authority=$RUNNER_TEMP/platformctl-ca.pem"
          fi

          kubectl config set-cluster platformctl-cluster --server="$SERVER" $CERT_ARG --embed-certs=true \
            --kubeconfig="$RUNNER_TEMP/platformctl.kubeconfig"
          kubectl config set-credentials platformctl --token="$TOKEN" \
            --kubeconfig="$RUNNER_TEMP/platformctl.kubeconfig"
          kubectl config set-context platformctl --cluster=platformctl-cluster --user=platformctl \
            --kubeconfig="$RUNNER_TEMP/platformctl.kubeconfig"
          kubectl config use-context platformctl --kubeconfig="$RUNNER_TEMP/platformctl.kubeconfig"

          echo "PLATFORMCTL_KUBECONFIG=$RUNNER_TEMP/platformctl.kubeconfig" >> "$GITHUB_ENV"

      - name: Kubernetes runtime integration tests
        env:
          KUBECONFIG: ${{ env.PLATFORMCTL_KUBECONFIG }}
          PLATFORMCTL_REQUIRE_K8S: "1"
        run: |
          go test -tags integration -timeout 1200s \
            ./internal/adapters/runtime/kubernetes/... \
            ./internal/adapters/secrets/kubernetes/...
          go test -tags integration -timeout 1200s -run Kubernetes ./cmd/platformctl/...
