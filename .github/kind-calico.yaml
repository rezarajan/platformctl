# kind cluster for CI: default CNI disabled (Calico installed by the
# workflow — kindnet does not enforce NetworkPolicy, doc 11 GA caveat
# sweep) and three nodes so anti-affinity genuinely spreads pods.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  disableDefaultCNI: true
  podSubnet: "192.168.0.0/16"
nodes:
  - role: control-plane
  - role: worker
  - role: worker
