# goreleaser config for platformctl (docs/planning/08 §7 E8).
#
# Builds linux/darwin x amd64/arm64 binaries with the same flags CLAUDE.md
# mandates for local builds (CGO_ENABLED=0, -trimpath), stamping
# main.version from the release tag exactly as its own doc comment
# describes ("-ldflags -X main.version=..."). `{{ .Tag }}` (not
# `{{ .Version }}`) is used deliberately: goreleaser's `.Version` strips
# the leading "v", but `main.version`'s existing value ("v1.2.0") and every
# `--version` consumer expect the "vX.Y.Z" shape.
#
# Validated locally (network install, docs/planning/08 E8 record):
#   go run github.com/goreleaser/goreleaser/v2@latest check
#   go run github.com/goreleaser/goreleaser/v2@latest release --snapshot --clean
# both against goreleaser v2.17.0.
version: 2

project_name: platformctl

# No `before.hooks: go mod tidy` here on purpose: it mutates the working
# tree's go.mod/go.sum in place (verified locally — pulled in indirect
# test dependencies of in-flight branches as direct requires), which the
# release workflow's checkout-then-build should never do silently. `go
# build` works fine against the tree's already-consistent go.sum; module
# tidiness is CI's unit job's job (`go vet`/`go test` fail on drift), not
# the release pipeline's.
builds:
  - id: platformctl
    main: ./cmd/platformctl
    binary: platformctl
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Tag }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: platformctl
    ids:
      - platformctl
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

release:
  github:
    owner: rezarajan
    name: platformctl
  # docs/releasing.md drives the actual release process; goreleaser only
  # uploads artifacts to the GitHub Release the maintainer's tag push
  # creates the draft/entry for.
  mode: append
  prerelease: auto
