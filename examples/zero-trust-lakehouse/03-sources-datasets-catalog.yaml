# The orders Source is External, integrated through the mediated Connection
# (01-mesh.yaml) — platformctl never creates or destroys it. Its labels are
# the zero-trust label-scoped policy's audience input (policies/
# zero-trust-lakehouse.yaml, docs/adr/033): tier: gold marks it a sensitive,
# governed source; classification: pii records why.
apiVersion: datascape.io/v1alpha1
kind: Source
metadata:
  name: orders
  labels:
    tier: gold
    classification: pii
spec:
  engine: postgres
  external: true
  connectionRef:
    name: orders-db-mediated
  postgres:
    database: ordersdb
    schema: public
---
apiVersion: datascape.io/v1alpha1
kind: Source
metadata:
  name: events
spec:
  engine: mysql
  providerRef:
    name: events-mysql
  mysql:
    database: eventsdb
---
# Raw Parquet landing zone for the orders CDC leg — schema-carrying (Avro
# against lake-redpanda's registry), proving the parquet output format.
apiVersion: datascape.io/v1alpha1
kind: Dataset
metadata:
  name: orders-raw
spec:
  providerRef:
    name: lake-minio
  bucket: orders-raw
  prefix: orders/
  format: parquet
---
# Schemaless JSON landing zone for the events CDC leg — the second sink
# format, proving both the schema-carrying and schemaless s3sink paths.
apiVersion: datascape.io/v1alpha1
kind: Dataset
metadata:
  name: events-raw
spec:
  providerRef:
    name: lake-minio
  bucket: events-raw
  prefix: events/
  format: json
---
# The Iceberg warehouse bucket lakehouse-catalog (below) derives its
# NESSIE_CATALOG_* config from (docs/planning/08 D8) — and what Dagster/
# Trino write Iceberg tables into.
apiVersion: datascape.io/v1alpha1
kind: Dataset
metadata:
  name: warehouse
spec:
  providerRef:
    name: lake-minio
  bucket: warehouse
  prefix: iceberg/
  format: parquet
---
# The Iceberg catalog, as a provider-agnostic noun (docs/planning/03 §8.1).
# warehouseRef wires the warehouse Dataset above as this catalog's Iceberg
# warehouse (D8) — no nessie-provider-level warehouseS3* fields needed.
apiVersion: datascape.io/v1alpha1
kind: Catalog
metadata:
  name: lakehouse-catalog
spec:
  engine: nessie
  providerRef:
    name: catalog-svc
  warehouseRef:
    name: warehouse
