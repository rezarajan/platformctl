# platform/ — the project's shared control plane: credentials + the
# zero-trust mesh. platformctl NEVER stores secret VALUES in a manifest; a
# SecretReference names a secret and where to resolve it from. Copy
# .env.example to .env, fill it, and `source` it before apply.
#
# backend: env resolves DATASCAPE_SECRET_<NAME>_<KEY> (uppercased,
# '-' -> '_'). e.g. secret "orders-db-replication" key "password" reads
# DATASCAPE_SECRET_ORDERS_DB_REPLICATION_PASSWORD.
apiVersion: datascape.io/v1alpha1
kind: SecretReference
metadata:
  name: mesh-admin
spec:
  backend: env
  keys: [username, password]
---
apiVersion: datascape.io/v1alpha1
kind: SecretReference
metadata:
  name: orders-db-replication
spec:
  backend: env
  keys: [username, password]
---
apiVersion: datascape.io/v1alpha1
kind: SecretReference
metadata:
  name: events-db-root
spec:
  backend: env
  keys: [username, password]
---
apiVersion: datascape.io/v1alpha1
kind: SecretReference
metadata:
  name: lake-minio-root
spec:
  backend: env
  keys: [username, password]
