# Zero-Trust Lakehouse — credentials (SecretReferences)
#
# platformctl NEVER stores secret VALUES in a manifest. A SecretReference
# names a secret and where to resolve it from; the values come from the
# environment (backend: env) at apply time. Copy .env.example to .env,
# fill it, and `source` it (or `set -a; . ./.env; set +a`) before apply.
#
# backend: env resolves DATASCAPE_SECRET_<NAME>_<KEY> (uppercased,
# '-' -> '_'). e.g. secret "orders-db-admin" key "password" reads
# DATASCAPE_SECRET_ORDERS_DB_ADMIN_PASSWORD.
apiVersion: datascape.io/v1alpha1
kind: SecretReference
metadata:
  name: mesh-admin
spec:
  backend: env
  keys: [username, password]
---
apiVersion: datascape.io/v1alpha1
kind: SecretReference
metadata:
  name: orders-db-admin
spec:
  backend: env
  keys: [username, password]
---
apiVersion: datascape.io/v1alpha1
kind: SecretReference
metadata:
  name: orders-db-replication
spec:
  backend: env
  keys: [username, password]
---
apiVersion: datascape.io/v1alpha1
kind: SecretReference
