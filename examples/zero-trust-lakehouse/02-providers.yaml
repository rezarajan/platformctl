# The technology layer. Every Provider here realizes a provider-agnostic
# noun declared elsewhere (Source, EventStream, Dataset, Catalog, Binding)
# — see docs/planning/03-resource-model-reference.md. network/image use
# their defaults except where a locally-built image is required (see
# README.md#prerequisites for the one-time build).
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: lake-minio
spec:
  type: minio
  runtime:
    type: docker
    resources: {memory: 512Mi, memoryReservation: 256Mi}
  configuration: {port: 16898, rootSecretRef: lake-minio-root}
  secretRefs: [lake-minio-root]
---
# Realizes Catalog(engine: nessie) below. secretRefs lists lake-minio-root
# so the D8 warehouseRef-derivation (Catalog.spec.warehouseRef -> the
# `warehouse` Dataset -> lake-minio's published "s3" endpoint fact) can
# resolve real credentials for Nessie's Iceberg REST personality.
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: catalog-svc
spec:
  type: nessie
  runtime:
    type: docker
    resources: {memory: 1Gi, memoryReservation: 512Mi}
  configuration: {port: 16899}
  secretRefs: [lake-minio-root]
---
# Marquez + its own dedicated Postgres metadata store (internal, never
# published to the host) — both containers bounded by this one Provider's
# resources block (docs/planning/08 J5: "applied to EVERY long-running
# container this Provider realizes").
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: lake-lineage
spec:
  type: openlineage
  runtime:
    type: docker
    resources: {memory: 768Mi, memoryReservation: 384Mi}
  configuration: {apiPort: 16901}
---
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: events-mysql
spec:
  type: mysql
  runtime:
    type: docker
    resources: {memory: 512Mi, memoryReservation: 256Mi}
  configuration: {port: 16897, rootSecretRef: events-db-root}
  secretRefs: [events-db-root]
---
# Redpanda's built-in Confluent-compatible schema registry (docs/planning/08
# D1) is what makes the orders CDC leg's Avro -> parquet chain possible —
# requires --feature-gates=SchemaRegistrySupport=true.
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: lake-redpanda
spec:
  type: redpanda
  runtime:
    type: docker
    resources: {memory: 1Gi, memoryReservation: 512Mi}
  configuration:
    kafkaPort: 16895
    schemaRegistry: enabled
    schemaRegistryPort: 16896
---
# ONE shared Kafka Connect worker realizes BOTH CDC bindings below (the
# orders-mediated Postgres leg and the events MySQL leg) — Debezium's
# SupportedSourceEngines covers postgres/mysql/mariadb/mongodb on a single
# worker, and each connector's key/value converter is set at registration
# time (per-connector config), so orders (avro, schema-carrying) and events
# (plain json) coexist on one Connect process. The custom image (built once,
# see README.md#prerequisites — reused byte-for-byte from
# examples/cdc-attendance/s3sink-image/Dockerfile) adds Confluent's Avro
# converter on top of stock Debezium Connect, which orders' format: avro
# needs. configuration.replicationSecretRef is the credential fallback path
# for bindings whose Source has no connectionRef of its own (events, here);
# the orders binding's Source carries its own connectionRef + secretRef
# (the mediated Connection's, above) and never falls back to this field —
# see internal/adapters/providers/debezium's ResolveEndpointCredentials.
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: lake-debezium
spec:
  type: debezium
  runtime:
    type: docker
    resources: {memory: 2Gi, memoryReservation: 1Gi}
  configuration:
    image: datascape-s3sink-connect:local
    connectPort: 16893
    replicationSecretRef: events-db-root
  secretRefs: [events-db-root, orders-db-replication]
  # KNOWN GAP (see README.md#known-gaps): GraphScopedAccess's automatic
  # edge compiler (internal/application/graphaccess.ContainerOf) only
  # follows a resource's spec.providerRef when collapsing it onto its
  # realizing container — an EXTERNAL Source's spec.connectionRef (the
  # orders Source, mediated through orders-db-mediated) is not followed,
  # so the automatic minimal edge set never reaches the Connection's real
  # container. This explicit, narrow, label-selector-scoped grant (docs/
  # adr/026 §2, docs/adr/033 decision 3) is the documented escape hatch
  # for exactly this case: admits ONLY the one resource in this namespace
  # carrying clearance: gold (orders-db-mediated) — not a namespace-wide
  # hole. Requires LabelScopedAccess (already enabled) for the selector to
  # narrow the audience; without it a selector-bearing grant is inert.
  access:
    - namespace: default
      selector:
        matchLabels:
          clearance: gold
---
# ONE shared Kafka Connect worker realizes BOTH sink bindings (orders ->
# parquet, events -> json) into lake-minio.
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: lake-s3sink
spec:
  type: s3sink
  runtime:
    type: docker
    resources: {memory: 1536Mi, memoryReservation: 768Mi}
  configuration:
    image: datascape-s3sink-connect:local
    connectPort: 16894
    credentialsSecretRef: lake-minio-root
  secretRefs: [lake-minio-root]
---
# Optional, Alpha (gate TrinoProvider): the Iceberg query engine, wired to
# lakehouse-catalog (catalog-and-connections below) — one coordinator +
# (default) one worker container. Proves ICEBERG QUERY end-to-end: see
# README.md#iceberg-query-trino for the worked CREATE TABLE / SELECT.
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: lake-trino
spec:
  type: trino
  runtime:
    type: docker
    resources: {memory: 1536Mi, memoryReservation: 768Mi}
  configuration:
    port: 16900
    catalogRef: {name: lakehouse-catalog}
    warehouseProviderRef: {name: lake-minio}
  secretRefs: [lake-minio-root]
