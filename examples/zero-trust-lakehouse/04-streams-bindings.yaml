# orders-events carries change data FROM the gold-tier orders Source.
# clearance: gold is what authorizes this specific edge under the
# label-scoped policy (policies/zero-trust-lakehouse.yaml): the FROM
# endpoint (Source orders, tier: gold) may only feed a TO endpoint that
# itself carries clearance: gold. Remove this label and re-validate to see
# the same rule fire on the legitimate path (see README.md#zero-trust).
apiVersion: datascape.io/v1alpha1
kind: EventStream
metadata:
  name: orders-events
  labels:
    clearance: gold
spec:
  providerRef:
    name: lake-redpanda
  partitions: 3
  retention:
    duration: 3d
---
apiVersion: datascape.io/v1alpha1
kind: EventStream
metadata:
  name: events-events
spec:
  providerRef:
    name: lake-redpanda
  partitions: 3
  retention:
    duration: 3d
---
# CDC leg 1: the mediated, gold-tier orders database. observers hands
# lake-lineage's endpoint to Debezium's native OpenLineage integration
# (docs/planning/03 §9) — Debezium is the one v1.0.0 LineageAware provider.
# format: avro is schema-carrying (docs/planning/08 D1/D2): required so the
# sink leg below can land parquet — requires
# --feature-gates=SchemaRegistrySupport=true.
apiVersion: datascape.io/v1alpha1
kind: Binding
metadata:
  name: orders-to-events
  observers:
    - name: lake-lineage
spec:
  mode: cdc
  sourceRef:
    name: orders
  targetRef:
    name: orders-events
  providerRef:
    name: lake-debezium
  options:
    tables: [orders]
    snapshotMode: initial
    format: avro
---
# CDC leg 2: the managed MySQL events database — the second source, on the
# plain schemaless JSON path (no format override needed: an unset
# options.format on a Binding whose EventStream Provider isn't paired with
# a parquet Dataset stays JSON, docs/planning/08 D2's pre-parquet default).
apiVersion: datascape.io/v1alpha1
kind: Binding
metadata:
  name: events-to-events
  observers:
    - name: lake-lineage
spec:
  mode: cdc
  sourceRef:
    name: events
  targetRef:
    name: events-events
  providerRef:
    name: lake-debezium
  options:
    tables: [clicks]
    snapshotMode: initial
---
# Sink leg 1: orders-events -> raw Parquet. The parquet Dataset target
# implies avro on the read side automatically (s3sink's streamFormat) — no
# options needed here.
apiVersion: datascape.io/v1alpha1
kind: Binding
metadata:
  name: orders-events-to-lake
spec:
  mode: sink
  sourceRef:
    name: orders-events
  targetRef:
    name: orders-raw
  providerRef:
    name: lake-s3sink
---
# Sink leg 2: events-events -> raw JSON — the second sink format.
apiVersion: datascape.io/v1alpha1
kind: Binding
metadata:
  name: events-events-to-lake
spec:
  mode: sink
  sourceRef:
    name: events-events
  targetRef:
    name: events-raw
  providerRef:
    name: lake-s3sink
