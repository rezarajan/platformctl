# The Kubernetes project — a SECOND runtime for the same data platform
# (docs/adr/035 decision 1, docs/planning/08 M7). This is its own project
# folder (the Go-module shape: multiple runtimes = multiple project
# folders), so it COEXISTS with the Docker project one level up — no file
# swapping. It declares runtime.type: kubernetes and then includes the
# EXACT SAME plane folders as the Docker project via ../ paths: the planes
# are shared, only the runtime differs. Run it directly:
#
#   platformctl apply examples/zero-trust-lakehouse/k8s \
#     --state-file examples/zero-trust-lakehouse/ztl-k8s.state.json \
#     --auto-approve --feature-gates HighAvailability=true,TrinoProvider=true
#
# The Docker project (examples/zero-trust-lakehouse) stays applied and
# untouched. See README.md#kubernetes-variant.
apiVersion: datascape.io/v1alpha1
kind: Project
metadata:
  name: zero-trust-lakehouse-k8s
spec:
  runtime:
    type: kubernetes
    network: datascape-ztl
  zeroTrust: true
  # The SAME plane folders as the Docker project, referenced up one level.
  # Each plane's own datascape.yaml (an include: no runtime) is shared by
  # both projects unchanged — only this root's runtime.type differs.
  resources:
    - ../platform
    - ../sources
    - ../cdc
    - ../sinks
    - ../catalog
    - ../query
    - ../lineage
