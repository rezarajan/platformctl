# The Kubernetes variant of this project's ONE runtime declaration
# (docs/adr/035 decision 1, docs/planning/08 M7). Proves portability: the
# SAME planes (platform/, sources/, cdc/, sinks/, catalog/, query/,
# lineage/) apply unmodified against a cluster instead of Docker — only
# this one file changes. platformctl's project loader reads exactly one
# datascape.yaml, at the target path's own root (docs/planning/08 M1's
# LoadProject), so running the Kubernetes leg is a one-line swap, not a
# parallel copy of every plane:
#
#   cp datascape.yaml datascape.docker.yaml.bak   # keep the Docker one
#   cp k8s/datascape.yaml datascape.yaml
#   platformctl apply . --state-file ./ztl-k8s.state.json --auto-approve \
#     --feature-gates HighAvailability=true,TrinoProvider=true
#   mv datascape.docker.yaml.bak datascape.yaml    # swap back when done
#
# See README.md#kubernetes-variant for the full walkthrough, including what
# this repo's own dev cluster could and could not prove live.
apiVersion: datascape.io/v1alpha1
kind: Project
metadata:
  name: zero-trust-lakehouse
spec:
  runtime:
    type: kubernetes
    network: datascape-ztl
  zeroTrust: true
