# The crown jewel: the orders database is DARK. It runs on an isolated
# Docker network (ztl-orders-vpc) that nothing else in this manifest set —
# not Debezium, not any other Provider — ever joins. The ONLY path in is
# this openziti-realized Connection: an identity-attested, per-edge-
# authorized Ziti service (docs/planning/08 H6, docs/adr/022 Ring 2,
# docs/adr/027 Layer 1), never a plain forwarder. mesh's router crosses
# INTO ztl-orders-vpc via configuration.targetNetworks so it alone can
# reach the raw postgres fixture (stood up by test-zero-trust.sh/README's
# setup step — a pre-existing production database, not something
# platformctl creates or destroys, mirroring
# cmd/platformctl/testdata/openziti-scenario's own proven pattern).
#
# Gate: MediatedConnections (Alpha, disabled by default) — every command
# against this manifest set passes --feature-gates MediatedConnections=true.
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: mesh
  annotations:
    policy.datascape.io/exempt: |
      images-from-corp-registry: dev example uses the stock default openziti image, not registry.corp.*
      require-digest-pins: dev example uses the stock default openziti image by tag
spec:
  type: openziti
  runtime:
    type: docker
    resources: {memory: 384Mi, memoryReservation: 192Mi}
  secretRefs: [mesh-admin]
  configuration:
    adminSecretRef: mesh-admin
    controllerPort: 16890
    targetNetworks: [ztl-orders-vpc]
---
# Consumers (Debezium) address orders-db-mediated:16891 on the shared
# network — every hop underneath is mutually authenticated by Ziti; the
# real database address (ztl-orders-db:5432, only resolvable on
# ztl-orders-vpc) never appears anywhere a consumer can read it.
#
# clearance: gold — the label-scoped policy (policies/
# zero-trust-lakehouse.yaml) evaluates every graph-derived edge, including
# the orders Source's own connectionRef -> this Connection edge (docs/
# planning/03 §13.1). This Connection IS the one policy-approved, mediated
# route to the gold-tier orders Source, so it carries the clearance the
# policy requires — an unmediated or unlabeled route does not.
apiVersion: datascape.io/v1alpha1
kind: Connection
metadata:
  name: orders-db-mediated
  labels:
    clearance: gold
spec:
  providerRef:
    name: mesh
  scheme: tcp
  port: 16891
  target: ztl-orders-db:5432
  secretRef:
    name: orders-db-replication
