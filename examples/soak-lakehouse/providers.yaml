# The orchestrator-ready core: object store, Iceberg catalog, lineage
# backend, relational stores, and the proxy entrypoint surface. Dagster and
# Metabase run outside platformctl and connect to the endpoints in README.md.
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: lake-minio
spec:
  type: minio
  runtime: {type: docker, network: datascape}
  configuration: {image: minio/minio:latest, port: 19010, rootSecretRef: lake-minio-root}
  secretRefs: [lake-minio-root]
---
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: lake-catalog
spec:
  type: nessie
  runtime: {type: docker, network: datascape}
  configuration: {port: 19121}
---
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: lake-lineage
spec:
  type: openlineage
  runtime: {type: docker, network: datascape}
  configuration: {apiPort: 15100, dbSecretRef: lake-marquez-db}
  secretRefs: [lake-marquez-db]
---
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: lake-postgres
spec:
  type: postgres
  runtime: {type: docker, network: datascape}
  configuration: {image: postgres:16, port: 15434, superuserSecretRef: lake-pg-admin}
  secretRefs: [lake-pg-admin]
---
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: lake-mysql
spec:
  type: mysql
  runtime: {type: docker, network: datascape}
  configuration: {port: 13306, rootSecretRef: lake-mysql-root}
  secretRefs: [lake-mysql-root]
---
# The entrypoint surface: every external dependency gets a platform-owned
# address. In-network consumers use edge-orders-db:15999; host tools use
# 127.0.0.1:15999. routes[].via is reserved for tunnel chaining (VPC reach)
# — see docs/design/002-soak-orchestrator-infrastructure.md.
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: edge
spec:
  type: proxy
  runtime: {type: docker, network: datascape}
  configuration:
    routes:
      - {name: orders-db, listenPort: 15999, target: "external-orders-db:5432"}
