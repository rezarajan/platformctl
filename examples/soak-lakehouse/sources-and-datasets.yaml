# Managed sources orchestrators read from / write to.
apiVersion: datascape.io/v1alpha1
kind: Source
metadata:
  name: app-db
spec:
  engine: postgres
  providerRef: {name: lake-postgres}
  postgres: {database: appdb, schema: public}
---
apiVersion: datascape.io/v1alpha1
kind: Source
metadata:
  name: events-db
spec:
  engine: mysql
  providerRef: {name: lake-mysql}
  mysql: {database: eventsdb}
---
# An external database, reached through the proxy's stable entrypoint.
# Datascape never creates or destroys it (NFR-3 double lock applies).
apiVersion: datascape.io/v1alpha1
kind: Source
metadata:
  name: orders-db
spec:
  engine: postgres
  external: true
  connectionRef: {name: ext-orders-conn}
  postgres: {database: orders}
---
# The Iceberg warehouse bucket Dagster materializes assets into, cataloged
# by Nessie.
apiVersion: datascape.io/v1alpha1
kind: Dataset
metadata:
  name: warehouse
spec:
  providerRef: {name: lake-minio}
  bucket: warehouse
  prefix: iceberg/
  format: parquet
