  annotations:
    policy.datascape.io/exempt: "forbid-env-secret-backend: dev example reads credentials from the shell environment for local iteration"
spec: {backend: env, keys: [username, password]}
---
# Credentials for the external orders database. The Connection resource
# (connections.yaml) carries the address; this carries the credentials —
# the platform never stores either, it resolves them at reconcile time.
apiVersion: datascape.io/v1alpha1
kind: SecretReference
metadata:
  name: ext-orders-creds
  annotations:
    policy.datascape.io/exempt: "forbid-env-secret-backend: dev example reads credentials from the shell environment for local iteration"
spec: {backend: env, keys: [username, password]}
