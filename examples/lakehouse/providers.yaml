# The technology layer: every Provider here realizes provider-agnostic
# resources declared in the other files — the model speaks Catalog,
# Connection, Source, EventStream, Dataset; technologies never become nouns.
# Dagster and Metabase run outside platformctl and connect to the endpoints
# in README.md. network/image/bootstrapServers all use their defaults
# throughout — see README.md#defaults (docs/planning/08 E2).
#
# docs/adr/021 zero-trust pack (H4): every Provider below uses its stock
# default image (or, for orders-cdc, a locally-built one), not a
# registry.corp.* digest pin — waived below, not applicable outside this
# dev example (docs/planning/08 A10 covers production digest pinning).
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: lake-minio
  annotations:
    policy.datascape.io/exempt: |
      images-from-corp-registry: dev example uses the stock default image, not registry.corp.*
      require-digest-pins: dev example uses the stock default image by tag
spec:
  type: minio
  runtime: {type: docker}
  configuration: {port: 19010, rootSecretRef: lake-minio-root}
  secretRefs: [lake-minio-root]
---
# Realizes Catalog(engine: nessie) — see catalog-and-connections.yaml.
# secretRefs lists lake-minio-root (docs/planning/08 D8) so the engine can
# resolve the warehouse Dataset's realizing Provider's credential values for
# the Catalog's warehouseRef-derived warehouse config — the same "must also
# be listed in spec.secretRefs" convention s3's rootSecretRef and D10's
# warehouseS3SecretRef already use.
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: catalog-svc
  annotations:
    policy.datascape.io/exempt: |
      images-from-corp-registry: dev example uses the stock default image, not registry.corp.*
      require-digest-pins: dev example uses the stock default image by tag
spec:
  type: nessie
  runtime: {type: docker}
  configuration: {port: 19121}
  secretRefs: [lake-minio-root]
---
# Marquez + its dedicated metadata store (a Postgres internal to the
# provider, never published to the host); publishes its endpoint so
# metadata.observers entries resolve against it.
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: lake-lineage
  annotations:
    policy.datascape.io/exempt: |
      images-from-corp-registry: dev example uses the stock default image, not registry.corp.*
      require-digest-pins: dev example uses the stock default image by tag
spec:
  type: openlineage
  runtime: {type: docker}
  configuration: {apiPort: 15100}
---
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: lake-postgres
  annotations:
    policy.datascape.io/exempt: |
      images-from-corp-registry: dev example uses the stock default image, not registry.corp.*
      require-digest-pins: dev example uses the stock default image by tag
spec:
  type: postgres
  runtime: {type: docker}
  configuration: {version: "16", port: 15434, superuserSecretRef: lake-pg-admin}
  secretRefs: [lake-pg-admin]
---
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: lake-mysql
  annotations:
    policy.datascape.io/exempt: |
      images-from-corp-registry: dev example uses the stock default image, not registry.corp.*
      require-digest-pins: dev example uses the stock default image by tag
spec:
  type: mysql
  runtime: {type: docker}
  configuration: {port: 13306, rootSecretRef: lake-mysql-root}
  secretRefs: [lake-mysql-root]
---
# Realizes managed Connections (catalog-and-connections.yaml): one
# forwarder per Connection, named after it. No central container — this
# Provider anchors the network and the forwarder image defaults.
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: edge
  annotations:
    policy.datascape.io/exempt: |
      images-from-corp-registry: dev example uses the stock default forwarder image, not registry.corp.*
      require-digest-pins: dev example uses the stock default forwarder image by tag
spec:
  type: proxy
  runtime: {type: docker}
---
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: lake-redpanda
  annotations:
    policy.datascape.io/exempt: |
      images-from-corp-registry: dev example uses the stock default image, not registry.corp.*
      require-digest-pins: dev example uses the stock default image by tag
spec:
  type: redpanda
  runtime: {type: docker}
  configuration:
    kafkaPort: 19096
---
# The CDC worker for the external orders database. It lists the
# Connection's secretRef so the engine resolves those credentials for the
# connector registration (docs/planning/03 §3.2).
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: orders-cdc
  annotations:
    policy.datascape.io/exempt: |
      images-from-corp-registry: dev example uses the stock default image, not registry.corp.*
      require-digest-pins: dev example uses the stock default image by tag
spec:
  type: debezium
  runtime: {type: docker}
  configuration:
    connectPort: 18086
  secretRefs: [ext-orders-creds]
