# Managed sources orchestrators read from / write to.
apiVersion: datascape.io/v1alpha1
kind: Source
metadata:
  name: app-db
spec:
  engine: postgres
  providerRef: {name: lake-postgres}
  postgres: {database: appdb, schema: public}
---
apiVersion: datascape.io/v1alpha1
kind: Source
metadata:
  name: events-db
spec:
  engine: mysql
  providerRef: {name: lake-mysql}
  mysql: {database: eventsdb}
---
# The external orders database, integrated through its Connection: the
# platform never creates or destroys it (NFR-3 double lock applies), but
# actively configures against it — see the CDC Binding in
# streams-and-bindings.yaml, which registers its connector at the
# Connection's endpoint with the Connection's credentials.
apiVersion: datascape.io/v1alpha1
kind: Source
metadata:
  name: orders
spec:
  engine: postgres
  external: true
  connectionRef: {name: orders-db}
  postgres: {database: orders, schema: public}
---
# The Iceberg warehouse bucket Dagster materializes assets into, cataloged
# by lakehouse-catalog.
apiVersion: datascape.io/v1alpha1
kind: Dataset
metadata:
  name: warehouse
spec:
  providerRef: {name: lake-minio}
  bucket: warehouse
  prefix: iceberg/
  format: parquet
