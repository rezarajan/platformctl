# A stand-in lineage backend Provider: it reconciles nothing real (type:
# noop on the fake runtime) but gives metadata.observers a resolvable
# endpoint, proving the LineageAware forwarding mechanism without Marquez.
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: test-lineage-fake
  # docs/adr/021 zero-trust pack (H4): a noop/fake-runtime stand-in has no
  # real image at all — waived, not applicable outside this dev example.
  annotations:
    policy.datascape.io/exempt: |
      images-from-corp-registry: fake-runtime stand-in Provider, no real image to pin
      require-digest-pins: fake-runtime stand-in Provider, no real image to pin
spec:
  type: noop
  runtime:
    type: fake
    # J5 (docs/planning/08): bounded so schedulers place by request and
    # container-aware JVMs size heap from the limit, not host memory.
    resources: {memory: 256Mi, memoryReservation: 128Mi}
  configuration:
    url: http://localhost:8080/api/v1/lineage
