# network, image, and bootstrapServers all use their defaults (see README.md#defaults).
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: postgres-cdc
spec:
  type: debezium
  runtime:
    type: docker
  configuration:
    connectPort: 18083
    replicationSecretRef: postgres-replication-creds
  secretRefs: [postgres-replication-creds]
