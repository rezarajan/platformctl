apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: local-minio
spec:
  type: minio
  runtime:
    type: docker
    network: datascape
  configuration:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    port: 19000
    rootSecretRef: minio-root-creds
  secretRefs: [minio-root-creds]
