# network and image use their defaults (see README.md#defaults).
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: local-redpanda
  # docs/adr/021 zero-trust pack (H4): dev example uses the stock default
  # Redpanda image, not a corp-registry digest pin — waived, not
  # applicable outside this dev example.
  annotations:
    policy.datascape.io/exempt: |
      images-from-corp-registry: dev example uses the stock default image, not registry.corp.*
      require-digest-pins: dev example uses the stock default image by tag; docs/planning/08 A10 covers production digest pinning
spec:
  type: redpanda
  runtime:
    type: docker
  configuration:
    kafkaPort: 19093
    # Redpanda's built-in Confluent-compatible schema registry, required by
    # the parquet Dataset (docs/planning/08 D2): the CDC leg serializes
    # change events as Avro against it, and the sink decodes them into the
    # schema-carrying records the parquet writer needs. Endpoint published
    # via providerState + `platformctl inventory`. Requires the
    # SchemaRegistrySupport feature gate (see README.md#run-it).
    schemaRegistry: enabled
    schemaRegistryPort: 18081
