apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: local-postgres
  # docs/adr/021 zero-trust pack (H4): dev example uses the stock default
  # Postgres image, not a corp-registry digest pin — waived, not applicable
  # outside this dev example.
  annotations:
    policy.datascape.io/exempt: |
      images-from-corp-registry: dev example uses the stock default image, not registry.corp.*
      require-digest-pins: dev example uses the stock default image by tag; docs/planning/08 A10 covers production digest pinning
spec:
  type: postgres
  runtime:
    type: docker
  configuration:
    version: "16"
    port: 15432
    superuserSecretRef: postgres-admin-creds
    replicationSecretRef: postgres-replication-creds
  secretRefs: [postgres-admin-creds, postgres-replication-creds]
