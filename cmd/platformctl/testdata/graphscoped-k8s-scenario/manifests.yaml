# docs/adr/026 H7 (as amended by the 2026-07-23 addendum) accept scenario,
# Kubernetes leg — see testdata/graphscoped-scenario/manifests.yaml (the
# Docker leg) for the full rationale; identical edge shape (R1 -> {X, Y},
# R2 -> {X}, other-b unreferenced), realized as per-container NetworkPolicy
# (docs/adr/026 H7) rather than per-edge Docker networks.
#
# metadata.domain assignment here is deliberately NOT "everyone in one
# namespace" (unlike a from-scratch design would default to) — it exists
# ONLY so the live accept test (graphscoped_kubernetes_integration_test.go)
# has an UNAMBIGUOUS vantage point per prober: R1 and R2 each get their own
# domain (so "the newest ready pod in R1's namespace" is unambiguously R1
# itself — Kubernetes' ProbeReachable has no per-pod-identity vantage
# selector, only per-namespace), while X and other-b deliberately SHARE one
# domain ("b") — the single most important proof in this whole scenario:
# X and other-b are NAMESPACE-MATES (same K8s Namespace, same H5 domain
# wall), yet R1 reaches ONLY X, never other-b — proof that reachability
# here is resource-granular (H7), not merely domain-granular (H5): H5 alone
# (no crossDomain hole declared for either, since these are plain
# metadata.observers edges, not connectionRef) would already deny BOTH; H7
# must additionally OPEN exactly the declared one.
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: gsa-it-r1
  namespace: a
  domain: r1dom
  observers:
    - name: gsa-it-x
      namespace: b
    - name: gsa-it-y
      namespace: c
spec:
  type: container
  runtime:
    type: kubernetes
  configuration:
    image: alpine:3.20
    cmd: ["sleep", "600"]
---
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: gsa-it-r2
  namespace: a
  domain: r2dom
  observers:
    - name: gsa-it-x
      namespace: b
spec:
  type: container
  runtime:
    type: kubernetes
  configuration:
    image: alpine:3.20
    cmd: ["sleep", "600"]
---
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: gsa-it-x
  namespace: b
  domain: b
spec:
  type: container
  runtime:
    type: kubernetes
  configuration:
    image: alpine/socat:1.8.0.3@sha256:beb4a68d9e4fe6b0f21ea774a0fde6c31f580dde6368939ed70100c5385b015e
    cmd: ["-u", "tcp-listen:8080,fork,reuseaddr", "open:/dev/null"]
    ports: [8080]
---
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: gsa-it-y
  namespace: c
  domain: c
spec:
  type: container
  runtime:
    type: kubernetes
  configuration:
    image: alpine/socat:1.8.0.3@sha256:beb4a68d9e4fe6b0f21ea774a0fde6c31f580dde6368939ed70100c5385b015e
    cmd: ["-u", "tcp-listen:8080,fork,reuseaddr", "open:/dev/null"]
    ports: [8080]
---
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: gsa-it-other-b
  namespace: b
  domain: b
spec:
  type: container
  runtime:
    type: kubernetes
  configuration:
    image: alpine/socat:1.8.0.3@sha256:beb4a68d9e4fe6b0f21ea774a0fde6c31f580dde6368939ed70100c5385b015e
    cmd: ["-u", "tcp-listen:8080,fork,reuseaddr", "open:/dev/null"]
    ports: [8080]
