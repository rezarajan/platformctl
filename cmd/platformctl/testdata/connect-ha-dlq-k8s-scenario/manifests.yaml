# I6/I7 (docs/planning/08 §7.8): the Kubernetes leg of
# TestConnectWorkersHAAndDeadLetterQueue's C3+D6 claims together — mirroring
# testdata/connect-ha-dlq-scenario's resource shape (including its
# workers: 2 debezium Provider) on runtime: kubernetes.
#
# I6 found this Kubernetes leg didn't work at all: debezium/s3sink's
# workers > 1 opts into the Deployment (StableIdentity: false) shape
# (docs/adr/004), and providerkit.ReachableURLs/ProbeConnectWorkerSet
# addressed it via runtime.OrdinalName(name, i) -> EnsureReachable/Inspect —
# ordinal-named objects that only exist for the StatefulSet
# (StableIdentity: true) shape. A Kubernetes Deployment is exactly one
# object with randomly-suffixed pods, so every ordinal lookup failed
# outright ("no member of ... is currently reachable"), even when the
# worker set was healthy. I7 (docs/adr/004's addendum) fixed this at the
# providerkit/runtime-port seam: a runtime.MemberSetRuntime capability lets
# providerkit resolve/probe a Deployment-shaped set once, by its own bare
# Name, which Kubernetes' Service/label-selector and Inspect(name) already
# answer correctly for "any one live member" / the aggregate ready count —
# no Kubernetes reachability code needed to change. This scenario now
# exercises the same C3 claim the Docker fixture does: a 2-worker debezium
# Connect set stays live (pipeline keeps flowing, DLQ path still works)
# when one worker pod is killed out-of-band, self-healed natively by the
# Deployment controller (no `apply` needed, unlike Docker).
apiVersion: datascape.io/v1alpha1
kind: SecretReference
metadata:
  name: chdlqk8s-pg-admin
spec:
  backend: env
  keys: [username, password]
---
apiVersion: datascape.io/v1alpha1
kind: SecretReference
metadata:
  name: chdlqk8s-pg-repl
spec:
  backend: env
  keys: [username, password]
---
apiVersion: datascape.io/v1alpha1
kind: SecretReference
metadata:
  name: chdlqk8s-minio-root
spec:
  backend: env
  keys: [username, password]
---
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: datascape-chdlqk8s-rp
spec:
  type: redpanda
  runtime:
    type: kubernetes
    network: datascape-chdlqk8s-test-ns
    access: node-port
---
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: datascape-chdlqk8s-pg
spec:
  type: postgres
  runtime:
    type: kubernetes
    network: datascape-chdlqk8s-test-ns
    access: node-port
  configuration:
    version: "16"
    superuserSecretRef: chdlqk8s-pg-admin
    replicationSecretRef: chdlqk8s-pg-repl
  secretRefs: [chdlqk8s-pg-admin, chdlqk8s-pg-repl]
---
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: datascape-chdlqk8s-dbz
spec:
  type: debezium
  runtime:
    type: kubernetes
    network: datascape-chdlqk8s-test-ns
    access: node-port
  configuration:
    image: quay.io/debezium/connect:2.7@sha256:f062d06e19be455ebf43cca662747f2ab6efbe4678954e7d64ac06055b8c7aff
    bootstrapServers: datascape-chdlqk8s-rp:29092
    replicationSecretRef: chdlqk8s-pg-repl
    workers: 2               # requires --feature-gates=HighAvailability=true (I7)
  secretRefs: [chdlqk8s-pg-repl]
---
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: datascape-chdlqk8s-minio
spec:
  type: minio
  runtime:
    type: kubernetes
    network: datascape-chdlqk8s-test-ns
    access: node-port
  configuration:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
    rootSecretRef: chdlqk8s-minio-root
  secretRefs: [chdlqk8s-minio-root]
---
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: datascape-chdlqk8s-s3
spec:
  type: s3sink
  runtime:
    type: kubernetes
    network: datascape-chdlqk8s-test-ns
    access: node-port
  configuration:
    image: datascape-s3sink-connect:test
    bootstrapServers: datascape-chdlqk8s-rp:29092
    credentialsSecretRef: chdlqk8s-minio-root
  secretRefs: [chdlqk8s-minio-root]
---
apiVersion: datascape.io/v1alpha1
kind: Source
metadata:
  name: chdlqk8s-students
spec:
  engine: postgres
  providerRef:
    name: datascape-chdlqk8s-pg
  postgres:
    database: attendance
    schema: public
---
apiVersion: datascape.io/v1alpha1
kind: EventStream
metadata:
  name: chdlqk8s-attendance-events
spec:
  providerRef:
    name: datascape-chdlqk8s-rp
  partitions: 1
  retention:
    duration: 1d
---
apiVersion: datascape.io/v1alpha1
kind: EventStream
metadata:
  name: chdlqk8s-attendance-events-dlq
spec:
  providerRef:
    name: datascape-chdlqk8s-rp
  partitions: 1
  retention:
    duration: 1d
---
apiVersion: datascape.io/v1alpha1
kind: Dataset
metadata:
  name: chdlqk8s-attendance-raw
spec:
  providerRef:
    name: datascape-chdlqk8s-minio
  bucket: raw-events
  prefix: attendance/
  format: json
---
apiVersion: datascape.io/v1alpha1
kind: Binding
metadata:
  name: chdlqk8s-students-to-events
spec:
  mode: cdc
  sourceRef:
    name: chdlqk8s-students
  targetRef:
    name: chdlqk8s-attendance-events
  providerRef:
    name: datascape-chdlqk8s-dbz
  options:
    tables: [students]
    snapshotMode: initial
---
apiVersion: datascape.io/v1alpha1
kind: Binding
metadata:
  name: chdlqk8s-events-to-lake
spec:
  mode: sink
  sourceRef:
    name: chdlqk8s-attendance-events
  targetRef:
    name: chdlqk8s-attendance-raw
  providerRef:
    name: datascape-chdlqk8s-s3
  options:
    deadLetter:
      stream: chdlqk8s-attendance-events-dlq
      tolerance: all
