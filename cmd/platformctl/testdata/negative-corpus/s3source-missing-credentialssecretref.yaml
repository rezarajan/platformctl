# Class: Provider configuration fragment — required field missing
# (docs/planning/08 D4; gate IngestProvider, enabled by the test harness).
# A Dataset origin has no Connection of its own, so credentialsSecretRef is
# the only possible credential source — unconditionally required.
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: ssrc
spec:
  type: s3source
  runtime: {type: fake}
  configuration:
    image: "datascape-s3source-connect:local"
    bootstrapServers: "broker:29092"
