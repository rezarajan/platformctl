apiVersion: datascape.io/v1alpha1
kind: SecretReference
metadata: { name: pg-admin }
spec: { backend: env, keys: [username, password] }
---
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata: { name: db }
spec:
  type: postgres
  secretRefs: [pg-admin]
  configuration: { superuserSecretRef: pg-admin }
  access:
    - namespace: other
