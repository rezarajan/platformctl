# Minimal permissions the Kubernetes ContainerRuntime adapter
# (internal/adapters/runtime/kubernetes) needs — exactly the verbs its
# Ensure*/Remove*/List*/Logs/ReadFile/EnsureReachable methods call, kept in
# sync with internal/adapters/runtime/kubernetes/preflight.go's
# preflightChecks (docs/planning/08 B5/B6). A ClusterRole, not a namespaced
# Role: the adapter creates and operates in Namespaces it names dynamically
# from each Provider's spec.runtime.network, so its reach can't be scoped to
# one namespace ahead of time. Bind it with binding.yaml for the minimal
# production posture; see README.md in this directory for the alternative
# cluster-admin dev shortcut.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platformctl
rules:
  # Namespaces and Nodes are cluster-scoped — no Role can grant access to
  # them, only a ClusterRole.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "create", "delete", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list"] # node-port access mode: resolves a node address to advertise/dial
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "create", "update", "delete", "list"]
  # StatefulSets: the StableIdentity replica-set shape and the
  # shape-transition guard's existence checks (docs/planning/08 C1,
  # docs/adr/004) — every EnsureContainer/Inspect/ListManaged/Remove call
  # consults both workload shapes.
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "create", "update", "delete", "list"]
  # PodDisruptionBudgets: applied automatically whenever Replicas > 1
  # (docs/adr/004), removed with the workload.
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "create", "update", "delete", "list"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "create", "update", "delete", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "delete"] # create/delete: ProbeReachable's ephemeral probe pod fallback (docs/planning/08 C10); also ObserveIsolationEnforcement's ephemeral canary listener (docs/planning/08 H8) — no new verb needed, reuses these same four
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"] # ReadFile's live-path fallback (readFileViaExec)
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["create"] # port-forward access mode (docs/planning/08 B1), the default
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "create", "update", "delete"] # "get" (not "list") is deliberately enough for ObserveIsolationEnforcement (docs/planning/08 H8) too — it checks one well-known policy name per already-listed managed namespace
  # Ingresses: the ingress provider's Kubernetes realization of a managed
  # HTTP Connection (docs/planning/08 C7, docs/adr/018) —
  # runtime.IngressCapableRuntime's EnsureIngress/GetIngress/RemoveIngress.
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "create", "update", "delete", "list"]
  # Jobs: runtime.JobCapableRuntime's Kubernetes realization of dbjob's
  # producer/consumer/cleanup pipeline (docs/adr/007-backup-restore.md
  # addendum 3, docs/planning/08 I15) — backup/restore on Kubernetes.
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "create", "update", "delete", "list", "watch"]
  # Preflight's own permission check (docs/planning/08 B6). Most clusters
  # already grant this to every authenticated principal via the built-in
  # system:basic-user ClusterRole bound to system:authenticated; listed
  # explicitly so this Role is self-contained on a cluster where that
  # default binding was removed.
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectaccessreviews"]
    verbs: ["create"]
