# The identity platformctl authenticates as when run under the minimal
# production posture (docs/planning/08 B5). Its own namespace is arbitrary —
# platformctl-system here — and unrelated to the Namespaces the adapter
# creates for Providers (those come from spec.runtime.network).
apiVersion: v1
kind: Namespace
metadata:
  name: platformctl-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platformctl
  namespace: platformctl-system
