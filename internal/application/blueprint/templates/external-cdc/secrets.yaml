apiVersion: datascape.io/v1alpha1
kind: SecretReference
metadata:
  name: ext-db-creds
  # docs/adr/021 zero-trust pack (H4): blueprint reads credentials from the
  # shell environment for local iteration — waived; production uses the
  # vault/kubernetes backend (ADR 013).
  annotations:
    policy.datascape.io/exempt: "forbid-env-secret-backend: blueprint reads credentials from the shell environment for local iteration"
spec:
  backend: env
  keys: [username, password]
