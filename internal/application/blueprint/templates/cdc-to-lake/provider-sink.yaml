# The S3-sink Kafka Connect worker realizing Binding(mode: sink) below.
#
# Unlike the other providers in this blueprint, no stock Connect image
# ships the S3 sink plugin, so there is no usable default —
# spec.configuration.image is required. Build the image once with the
# Dockerfile next to this file:
#
#   docker build -t datascape-s3sink-connect:local ./s3sink-image
#
# `platformctl validate` does not need the image to exist (it never talks
# to Docker); `platformctl apply` does. spec.runtime.network is omitted
# (default applies) and so is bootstrapServers — inferred from the manifest
# graph, the same as provider-cdc.yaml (docs/planning/08 E2).
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: sink
  # docs/adr/021 zero-trust pack (H4): blueprint requires a locally built
  # image (no stock Connect image ships the S3 sink plugin), not a
  # registry.corp.* digest-pinned one — waived, not applicable outside
  # this dev-flavored starting point.
  annotations:
    policy.datascape.io/exempt: |
      images-from-corp-registry: blueprint requires a locally built image (datascape-s3sink-connect:local), not a corp registry
      require-digest-pins: blueprint tags locally for build-your-own iteration; docs/planning/08 A10 covers production digest pinning
spec:
  type: s3sink
  runtime:
    type: docker
  configuration:
    image: datascape-s3sink-connect:local
    credentialsSecretRef: lake-root-creds
  secretRefs: [lake-root-creds]
