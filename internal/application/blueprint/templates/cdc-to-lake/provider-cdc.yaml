# The Debezium Kafka Connect worker realizing Binding(mode: cdc) below.
# spec.runtime.network and spec.configuration.bootstrapServers are both
# omitted (docs/planning/08 E2): the default network applies, and
# bootstrapServers is inferred from the manifest graph — the CDC Binding
# below targets app-events, whose Provider is broker. Pin
# bootstrapServers: broker:29092 explicitly if you rewire the Binding to a
# different EventStream than this worker should actually join.
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: cdc
  # docs/adr/021 zero-trust pack (H4): blueprint uses the default pinned
  # image, not a registry.corp.* one — waived, not applicable outside this
  # dev-flavored starting point.
  annotations:
    policy.datascape.io/exempt: |
      images-from-corp-registry: blueprint uses the default pinned image, not registry.corp.*
      require-digest-pins: blueprint's default image is tag-resolved at the runtime layer, not expressed as a digest in this manifest field
spec:
  type: debezium
  runtime:
    type: docker
  configuration:
    replicationSecretRef: db-replication-creds
  secretRefs: [db-replication-creds]
