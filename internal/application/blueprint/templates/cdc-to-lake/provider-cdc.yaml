# The Debezium Kafka Connect worker realizing Binding(mode: cdc) below.
# bootstrapServers addresses the broker Provider by name on the shared
# Docker network at its fixed in-network Kafka port (29092).
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: cdc
spec:
  type: debezium
  runtime:
    type: docker
    network: datascape
  configuration:
    bootstrapServers: broker:29092
    replicationSecretRef: db-replication-creds
  secretRefs: [db-replication-creds]
