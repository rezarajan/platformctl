# Managed MinIO — the object store the sink Binding lands objects in.
# spec.runtime.network and spec.configuration.image are omitted: the
# default network and this provider's pinned default image apply
# (docs/planning/08 E2).
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: lake
spec:
  type: minio
  runtime:
    type: docker
  configuration:
    rootSecretRef: lake-root-creds
  secretRefs: [lake-root-creds]
