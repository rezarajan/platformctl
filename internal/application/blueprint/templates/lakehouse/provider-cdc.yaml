# The Debezium Kafka Connect worker realizing both CDC Bindings below: the
# managed app-db one and the external legacy-db one. secretRefs lists
# credentials for both — the managed Source's replicationSecretRef
# (already declared on the Provider config) and the external Connection's
# own credentials (ext-legacy-creds), which the CDC provider resolves the
# legacy database's address from automatically. bootstrapServers is
# omitted — inferred from the manifest graph: both CDC Bindings below
# target an EventStream whose Provider is broker (docs/planning/08 E2).
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: cdc
spec:
  type: debezium
  runtime:
    type: docker
  configuration:
    replicationSecretRef: db-replication-creds
  secretRefs: [db-replication-creds, ext-legacy-creds]
