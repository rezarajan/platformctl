# Managed Postgres — the database this blueprint captures changes from.
# spec.configuration.image is omitted: the provider selects the default
# image for spec.configuration.version. The host port is omitted too: the
# provider auto-assigns a stable, collision-avoiding port from the resource
# name (see `platformctl inventory` after apply for the chosen port).
# spec.runtime.network is omitted too — every Provider in this blueprint
# defaults to the same "datascape" network (docs/planning/08 E2).
apiVersion: datascape.io/v1alpha1
kind: Provider
metadata:
  name: db
  # docs/adr/021 zero-trust pack (H4): blueprint uses the default pinned
  # image, not a registry.corp.* one — waived, not applicable outside this
  # dev-flavored starting point.
  annotations:
    policy.datascape.io/exempt: |
      images-from-corp-registry: blueprint uses the default pinned image, not registry.corp.*
      require-digest-pins: blueprint's default image is tag-resolved at the runtime layer, not expressed as a digest in this manifest field
spec:
  type: postgres
  runtime:
    type: docker
  configuration:
    version: "16"
    superuserSecretRef: db-admin-creds
    replicationSecretRef: db-replication-creds
  secretRefs: [db-admin-creds, db-replication-creds]
