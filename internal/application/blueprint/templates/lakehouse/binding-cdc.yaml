# Only tables listed under options.tables are captured; add more and
# re-apply to widen capture without recreating any infrastructure.
# observers hands the lineage backend's endpoint to the debezium provider.
apiVersion: datascape.io/v1alpha1
kind: Binding
metadata:
  name: db-to-events
  observers:
    - name: lineage
spec:
  mode: cdc
  sourceRef:
    name: app-db
  targetRef:
    name: app-events
  providerRef:
    name: cdc
  options:
    tables: [records]
    snapshotMode: initial
