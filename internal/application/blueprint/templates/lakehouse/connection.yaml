# The stable entrypoint to an external legacy database: in-network
# consumers (the CDC connector) and host tools both address legacy-db at
# this Connection's port; only spec.target knows where the database
# actually lives. Credentials live in the SecretReference named by
# secretRef; the forwarder is transport only.
apiVersion: datascape.io/v1alpha1
kind: Connection
metadata:
  name: legacy-db
  # docs/adr/021 zero-trust pack (H4): blueprint forwards a plaintext TCP
  # connection to the external legacy database for simplicity — waived;
  # ADR 018/C8 covers the production TLS-terminated path.
  annotations:
    policy.datascape.io/exempt: "no-plaintext-connections: blueprint forwards raw TCP to a local/dev database for simplicity"
spec:
  providerRef:
    name: edge
  port: 25998
  target: external-legacy-db:5432
  secretRef:
    name: ext-legacy-creds
